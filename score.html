<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danza di Ninfe, e Pastori</title>

  <link rel="stylesheet" href="score.css">
  <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js"></script>
</head>

<body>
  <header class="site-header">
    <h1>Danza di Ninfe, e Pastori</h1>

    <div class="controls" aria-label="Score controls">
      <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
    </div>

    <div id="status">Loading…</div>
  </header>

  <main>
    <div id="score"></div>
  </main>

  <script>
    const MEI_FILE = "score.mei";

    const score = document.getElementById("score");
    const statusEl = document.getElementById("status");
    const zoomInButton = document.getElementById("zoom-in");
    const zoomOutButton = document.getElementById("zoom-out");

    let toolkit = null;
    let meiData = "";
    let resizeTimer = null;
    let zoomScale = Number(localStorage.getItem("scoreZoomScale")) || 38;

    zoomInButton.addEventListener("click", () => {
      zoomScale = Math.min(80, zoomScale + 4);
      localStorage.setItem("scoreZoomScale", zoomScale);
      renderScore();
    });

    zoomOutButton.addEventListener("click", () => {
      zoomScale = Math.max(16, zoomScale - 4);
      localStorage.setItem("scoreZoomScale", zoomScale);
      renderScore();
    });

    verovio.module.onRuntimeInitialized = async function () {
      try {
        statusEl.textContent = "Loading MEI…";
        toolkit = new verovio.toolkit();

        const response = await fetch(MEI_FILE);
        if (!response.ok) {
          throw new Error(`Could not load ${MEI_FILE}`);
        }

        meiData = await response.text();
        renderScore();

        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(renderScore, 200);
        });
      } catch (error) {
        console.error(error);
        statusEl.textContent = error.message;
      }
    };

    function renderScore() {
      if (!toolkit || !meiData) return;

      statusEl.textContent = "Rendering…";

      const containerWidth = score.clientWidth || window.innerWidth;
      const scale = zoomScale;

      toolkit.setOptions({
        scale: scale,
        pageWidth: Math.round(containerWidth * 100 / scale),
        pageHeight: 3000,
        adjustPageHeight: true,
        breaks: "auto",
        footer: "none"
      });

      toolkit.loadData(meiData);

      const pageCount = toolkit.getPageCount();
      score.innerHTML = "";

      for (let pageNumber = 1; pageNumber <= pageCount; pageNumber++) {
        const page = document.createElement("section");
        page.className = "page";
        page.setAttribute("aria-label", `Page ${pageNumber}`);
        page.innerHTML = toolkit.renderToSVG(pageNumber, {});
        score.appendChild(page);
      }

      statusEl.textContent = `${pageCount} page${pageCount === 1 ? "" : "s"} · zoom ${scale}`;
    }
  </script>
</body>
</html>
