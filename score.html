<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Danza di Ninfe, e Pastori</title>

        <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js"></script>

        <style>
            html {
                box-sizing: border-box;
            }

            *,
            *::before,
            *::after {
                box-sizing: inherit;
            }

            body {
                margin: 0;
                background: #f4f4f4;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            header {
                position: sticky;
                top: 0;
                z-index: 10;
                padding: 0.75rem 1rem;
                background: white;
                border-bottom: 1px solid #ddd;
            }

            header h1 {
                margin: 0;
                font-size: 1rem;
                font-weight: 600;
            }

            #status {
                margin-top: 0.25rem;
                font-size: 0.875rem;
                color: #666;
            }

            #score {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                padding: 1rem;
            }

            .page {
                width: 100%;
                margin-bottom: 1rem;
                background: white;
                overflow: hidden;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
            }

            .page svg {
                width: 100%;
                height: auto;
                display: block;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>Danza di Ninfe, e Pastori</h1>
            <div id="status">Loading…</div>
        </header>

        <main>
            <div id="score"></div>
        </main>

        <script>
            const MEI_FILE = "score.mei";

            const score = document.getElementById("score");
            const statusEl = document.getElementById("status");

            let toolkit = null;
            let meiData = "";
            let resizeTimer = null;

            verovio.module.onRuntimeInitialized = async function () {
                try {
                    toolkit = new verovio.toolkit();

                    const response = await fetch(MEI_FILE);
                    meiData = await response.text();

                    renderScore();

                    window.addEventListener("resize", () => {
                        clearTimeout(resizeTimer);
                        resizeTimer = setTimeout(renderScore, 200);
                    });
                } catch (error) {
                    console.error(error);
                    statusEl.textContent = error.message;
                }
            };

            function renderScore() {
                if (!toolkit || !meiData) return;

                const containerWidth = score.clientWidth || window.innerWidth;
                const scale = containerWidth < 700 ? 32 : 38;

                toolkit.setOptions({
                    scale,
                    pageWidth: Math.round((containerWidth * 100) / scale),
                    pageHeight: 3000,
                    adjustPageHeight: true,
                    breaks: "auto",
                    footer: "none",
                });

                toolkit.loadData(meiData);

                const pageCount = toolkit.getPageCount();

                score.innerHTML = "";

                for (let page = 1; page <= pageCount; page++) {
                    const div = document.createElement("div");
                    div.className = "page";
                    div.innerHTML = toolkit.renderToSVG(page, {});
                    score.appendChild(div);
                }

                statusEl.textContent = `${pageCount} page${pageCount === 1 ? "" : "s"}`;
            }
        </script>
    </body>
</html>
