<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

            body {
                margin: 0;

                <!doctype html>
                <html lang="en">
                <head>
                  <meta charset="utf-8" />
                  <meta name="viewport" content="width=device-width, initial-scale=1" />
                  <title>MEI Score Viewer</title>

                  <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js"></script>

                  <style>
                    html {
                      box-sizing: border-box;
                    }

                    *, *::before, *::after {
                      box-sizing: inherit;
                    }

                    body {
                      margin: 0;
                      background: #f4f4f4;
                      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                    }

                    header {
                      position: sticky;
                      top: 0;
                      z-index: 10;
                      padding: 0.75rem 1rem;
                      background: white;
                      border-bottom: 1px solid #ddd;
                    }

                    header h1 {
                      margin: 0;
                      font-size: 1rem;
                      font-weight: 600;
                    }

                    #status {
                      margin-top: 0.25rem;
                      font-size: 0.875rem;
                      color: #666;
                    }

                    main {
                      width: 100%;
                    }

                    #score {
                      width: 100%;
                      max-width: 1100px;
                      margin: 0 auto;
                      padding: 1rem;
                    }

                    .page {
                      width: 100%;
                      margin-bottom: 1rem;
                      background: white;
                      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
                      overflow: hidden;
                    }

                    .page svg {
                      display: block;
                      width: 100%;
                      height: auto;
                    }

                    @media (max-width: 600px) {
                      #score {
                        padding: 0.5rem;
                      }

                      .page {
                        margin-bottom: 0.5rem;
                        box-shadow: none;
                      }
                    }
                  </style>
                </head>

                <body>
                  <header>
                    <h1>MEI Score Viewer</h1>
                    <div id="status">Loading Verovio…</div>
                  </header>

                  <main>
                    <div id="score"></div>
                  </main>

                  <script>
                    const MEI_FILE = "score.mei";

                    const score = document.getElementById("score");
                    const statusEl = document.getElementById("status");

                    let toolkit = null;
                    let meiData = "";
                    let resizeTimer = null;

                    verovio.module.onRuntimeInitialized = async function () {
                      try {
                        statusEl.textContent = "Loading MEI…";

                        toolkit = new verovio.toolkit();

                        const response = await fetch(MEI_FILE);
                        if (!response.ok) {
                          throw new Error(`Could not load ${MEI_FILE}`);
                        }

                        meiData = await response.text();

                        renderScore();

                        window.addEventListener("resize", function () {
                          clearTimeout(resizeTimer);
                          resizeTimer = setTimeout(renderScore, 200);
                        });
                      } catch (error) {
                        console.error(error);
                        statusEl.textContent = error.message;
                      }
                    };

                    function renderScore() {
                      if (!toolkit || !meiData) return;

                      statusEl.textContent = "Rendering…";

                      const containerWidth = score.clientWidth || window.innerWidth;
                      const scale = containerWidth < 700 ? 32 : 38;

                      toolkit.setOptions({
                        scale: scale,
                        pageWidth: Math.round(containerWidth * 100 / scale),
                        pageHeight: 3000,
                        adjustPageHeight: true,
                        breaks: "auto",
                        footer: "none"
                      });

                      toolkit.loadData(meiData);

                      const pageCount = toolkit.getPageCount();
                      score.innerHTML = "";

                      for (let pageNumber = 1; pageNumber <= pageCount; pageNumber++) {
                        const page = document.createElement("section");
                        page.className = "page";
                        page.setAttribute("aria-label", `Page ${pageNumber}`);
                        page.innerHTML = toolkit.renderToSVG(pageNumber, {});
                        score.appendChild(page);
                      }

                      statusEl.textContent = `${pageCount} page${pageCount === 1 ? "" : "s"}`;
                    }
                  </script>
                </body>
                </html> }

            #score {
                max-width: 1100px;
                margin: 0 auto;
                padding: 1rem;
            }

            .page {
                background: white;
                margin-bottom: 1rem;
                overflow-x: hidden;
            }

            .page svg {
                width: 100%;
                height: auto;
                display: block;
            }
        </style>
    </head>

    <body>
        <main id="score"></main>

        <script>
            const MEI_FILE = "score.mei";
            const score = document.getElementById("score");

            let tk;
            let meiData;
            let resizeTimer;

            async function init() {
                tk = await verovio.module.onRuntimeInitialized;
                tk = new verovio.toolkit();

                meiData = await fetch(MEI_FILE).then((r) => r.text());

                render();
                window.addEventListener("resize", () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(render, 200);
                });
            }

            function render() {
                const containerWidth = score.clientWidth || window.innerWidth;

                tk.setOptions({
                    pageWidth: Math.round((containerWidth * 100) / 35),
                    pageHeight: 3000,
                    scale: 35,
                    adjustPageHeight: true,
                    breaks: "auto",
                    footer: "none",
                });

                tk.loadData(meiData);

                const pageCount = tk.getPageCount();
                score.innerHTML = "";

                for (let page = 1; page <= pageCount; page++) {
                    const div = document.createElement("div");
                    div.className = "page";
                    div.innerHTML = tk.renderToSVG(page);
                    score.appendChild(div);
                }
            }

            init();
        </script>
    </body>
</html>
